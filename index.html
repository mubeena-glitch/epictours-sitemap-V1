<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicTours Sitemap Dashboard - Approval</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ff; color: #333; }
        .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; gap: 0; }
        
        .sidebar { background: linear-gradient(180deg, #7c3aed 0%, #6d28d9 100%); color: white; overflow-y: auto; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 1.5rem; }
        .sidebar-logo { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .sidebar-client { font-size: 0.8rem; opacity: 0.9; background: rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem; }
        .sidebar-subtitle { font-size: 0.75rem; opacity: 0.8; }
        .sidebar-menu { list-style: none; }
        .sidebar-item { padding: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: white; text-decoration: none; transition: all 0.3s ease; font-size: 0.9rem; cursor: pointer; border-left: 3px solid transparent; }
        .sidebar-link:hover { background: rgba(255,255,255,0.15); padding-left: 1.75rem; }
        .sidebar-link.active { background: rgba(255,255,255,0.2); border-left-color: #fbbf24; font-weight: 600; }
        .sidebar-icon { font-size: 1.2rem; flex-shrink: 0; }
        .page-status { font-size: 0.7rem; margin-left: auto; padding: 0.25rem 0.5rem; border-radius: 3px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
        
        .main-content { padding: 2rem; overflow-y: auto; }
        .page-header { background: white; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(147,84,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.5rem; font-weight: 700; color: #7c3aed; }
        .page-approval { display: flex; align-items: center; gap: 1rem; }
        .page-approve-btn { padding: 0.75rem 1.5rem; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9rem; }
        .page-approve-btn:hover { background: #059669; }
        .page-approve-btn.approved { background: #065f46; cursor: default; }
        
        .sections-container { display: flex; flex-direction: column; gap: 1.5rem; }
        .section-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(147,84,255,0.08); border: 1.5px solid #e9ddff; }
        .section-header { background: #f9f7ff; padding: 1.25rem; border-bottom: 1px solid #e9ddff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .section-title { font-size: 1rem; font-weight: 600; color: #7c3aed; }
        .section-icon { font-size: 1.2rem; }
        .section-content { padding: 1.5rem; display: none; }
        .section-content.expanded { display: block; }
        .section-items { background: #f9f7ff; padding: 1rem; border-radius: 8px; margin-top: 0.5rem; }
        .section-items ul { margin: 0; padding-left: 1.5rem; }
        .section-items li { margin: 0.5rem 0; color: #555; font-size: 0.9rem; }
        
        .feedback-box { background: #f9f7ff; border: 1px solid #e9ddff; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .feedback-label { font-size: 0.85rem; font-weight: 600; color: #7c3aed; margin-bottom: 0.5rem; display: block; }
        .feedback-textarea { width: 100%; padding: 0.75rem; border: 1px solid #e9ddff; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; min-height: 80px; resize: vertical; }
        .feedback-textarea:focus { outline: none; border-color: #9354ff; box-shadow: 0 0 0 3px rgba(147,84,255,0.1); }
        
        .action-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
        .btn-primary { background: #7c3aed; color: white; padding: 1rem 2rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; font-size: 1rem; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-primary:disabled { background: #d0d5dd; cursor: not-allowed; }
        
        .visual-sitemap { background: white; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(147,84,255,0.08); }
        .visual-title { font-size: 1.2rem; font-weight: 600; color: #7c3aed; margin-bottom: 1.5rem; }
        .sitemap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; }
        .page-node { padding: 1rem; border-radius: 8px; text-align: center; font-weight: 600; font-size: 0.8rem; transition: all 0.3s ease; border: 2px solid #e9ddff; }
        .page-node.pending { background: #fef3c7; color: #92400e; }
        .page-node.approved { background: #dcfce7; color: #065f46; border-color: #10b981; }
        
        .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #f9f7ff; padding: 1rem; border-radius: 8px; text-align: center; border-left: 4px solid #9354ff; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #7c3aed; }
        .stat-label { font-size: 0.8rem; color: #555; margin-top: 0.25rem; }
        
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { height: auto; position: relative; }
            .page-header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">NEXA Digital</div>
                <div class="sidebar-client">👤 EpicTours</div>
                <div class="sidebar-subtitle">Sitemap Approval</div>
            </div>
            <ul class="sidebar-menu" id="pageMenu"></ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- CURRENT PAGE -->
            <div id="pageContent"></div>

            <!-- VISUAL SUMMARY -->
            <div class="visual-sitemap" id="visualSummary" style="display: none;">
                <div class="visual-title">📊 Approval Summary</div>
                <div class="summary-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="approvedStat">0</div>
                        <div class="stat-label">Pages Approved</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalStat">13</div>
                        <div class="stat-label">Total Pages</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="percentStat">0%</div>
                        <div class="stat-label">Complete</div>
                    </div>
                </div>
                <div style="margin-top: 1.5rem;">
                    <div style="font-size: 1rem; font-weight: 600; color: #7c3aed; margin-bottom: 1rem;">Approved Pages:</div>
                    <div class="sitemap-grid" id="approvedPages"></div>
                </div>
            </div>

            <!-- SUBMIT BUTTON -->
            <div class="action-buttons" id="submitSection" style="display: none;">
                <button class="btn-primary" id="submitBtn" onclick="submitForReview()" disabled>📤 Submit for Review</button>
            </div>
        </div>
    </div>

    <script>
        const pages = [
            { name: 'Destinations', sections: ['Top Sights (5 cities)', 'Unique Experiences (5 cities)', 'All Activities (5 cities)'], icon: '🌍' },
            { name: 'All Tours Listing', sections: ['Search Interface', 'Advanced Filters', 'Tour Cards', 'Pagination'], icon: '📋' },
            { name: 'Paris City Page', sections: ['Top Sights', 'Unique Experiences', 'All Activities'], icon: '🗼' },
            { name: 'London City Page', sections: ['Top Sights', 'Unique Experiences', 'All Activities'], icon: '🚪' },
            { name: 'Rome City Page', sections: ['Top Sights', 'Unique Experiences', 'All Activities'], icon: '🏛️' },
            { name: 'New York City Page', sections: ['Top Sights', 'Unique Experiences', 'All Activities'], icon: '🗽' },
            { name: 'Barcelona City Page', sections: ['Top Sights', 'Unique Experiences', 'All Activities'], icon: '🎨' },
            { name: 'Blog & Content', sections: ['Destination Guides', 'Local Experiences', 'Travel Tips', 'Author Profiles'], icon: '📝' },
            { name: 'Help & Support', sections: ['Booking Guide', 'Cancellation Policy', 'FAQ', 'Contact Support'], icon: '❓' },
            { name: 'About Us', sections: ['Mission', 'Team', 'Values', 'Leadership', 'History', 'Press', 'Careers'], icon: '🏢' },
            { name: 'B2B Partners', sections: ['Affiliate Program', 'Benefits', 'Docs', 'API', 'Dashboard', 'Portal', 'Terms'], icon: '🤝' },
            { name: 'FAQ', sections: ['Booking', 'Cancellation', 'Refunds', 'Safety', 'Payments'], icon: '❔' },
            { name: 'Search & Filters', sections: ['Advanced Filters', 'Price Range', 'Duration', 'Time of Day'], icon: '🔍' }
        ];

        let approved = new Set();
        let currentPage = 0;

        function renderSidebar() {
            const menu = document.getElementById('pageMenu');
            menu.innerHTML = pages.map((page, idx) => `
                <li class="sidebar-item">
                    <div class="sidebar-link ${currentPage === idx ? 'active' : ''}" onclick="selectPage(${idx})">
                        <span class="sidebar-icon">${page.icon}</span>
                        <span>${page.name}</span>
                        <span class="page-status">${approved.has(idx) ? '✓' : ''}</span>
                    </div>
                </li>
            `).join('');
        }

        function selectPage(idx) {
            currentPage = idx;
            renderSidebar();
            renderPageContent();
        }

        function renderPageContent() {
            const page = pages[currentPage];
            const isApproved = approved.has(currentPage);
            
            const html = `
                <div class="page-header">
                    <div class="page-title">${currentPage + 1}. ${page.name}</div>
                    <div class="page-approval">
                        <button class="page-approve-btn ${isApproved ? 'approved' : ''}" onclick="approvePage()" ${isApproved ? 'disabled' : ''}>
                            ${isApproved ? '✓ Approved' : 'Approve Page'}
                        </button>
                    </div>
                </div>

                <div class="sections-container">
                    ${page.sections.map((section, idx) => `
                        <div class="section-card">
                            <div class="section-header" onclick="toggleSection(this)">
                                <div class="section-title">${section}</div>
                                <div class="section-icon">▼</div>
                            </div>
                            <div class="section-content">
                                <div style="color: #666; margin-bottom: 1rem;">This section contains the ${section.toLowerCase()} content and components.</div>
                                <div class="feedback-box">
                                    <label class="feedback-label">Feedback (optional):</label>
                                    <textarea class="feedback-textarea" placeholder="Add any feedback or changes needed for this section..."></textarea>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('pageContent').innerHTML = html;
            updateProgress();
        }

        function approvePage() {
            approved.add(currentPage);
            renderSidebar();
            renderPageContent();
        }

        function toggleSection(header) {
            header.nextElementSibling.classList.toggle('expanded');
            header.querySelector('.section-icon').style.transform = header.nextElementSibling.classList.contains('expanded') ? 'rotate(180deg)' : '';
        }

        function updateProgress() {
            const approvedCount = approved.size;
            const total = pages.length;
            const percent = Math.round((approvedCount / total) * 100);

            document.getElementById('approvedStat').textContent = approvedCount;
            document.getElementById('percentStat').textContent = percent + '%';

            // Show summary when all approved
            if (approvedCount === total) {
                document.getElementById('visualSummary').style.display = 'block';
                document.getElementById('submitSection').style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
                
                // Show approved pages
                const approved Nodes = [...approved].map(idx => `
                    <div class="page-node approved">${pages[idx].icon} ${pages[idx].name}</div>
                `).join('');
                document.getElementById('approvedPages').innerHTML = approvedNodes;
            } else {
                document.getElementById('visualSummary').style.display = 'none';
                document.getElementById('submitSection').style.display = 'none';
            }
        }

        function submitForReview() {
            const summary = pages
                .map((p, idx) => `${idx + 1}. ${p.name}`)
                .join('\n');

            const message = `✓ SITEMAP APPROVED FOR REVIEW\n\nAll 13 pages approved:\n\n${summary}\n\n127 Total Sections\n95% GetYourGuide Alignment\n\nSubmitting for design and development kickoff...`;
            
            alert(message);
            console.log('Submitted for review');
        }

        // Initialize
        renderSidebar();
        renderPageContent();
    </script>
</body>
</html>
